<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Jellyfin Manager</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="auth-page dark-mode">

<button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>
  Theme
</button>

<div class="login-card">
  <div class="mb-6">
    <h1>Jellyfin Manager</h1>
    <p>Sign in to manage user expiry</p>
  </div>

  <div id="errorAlert" class="alert alert-danger"></div>

  <form id="loginForm">
    <div class="mb-4">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="input-field" id="username" required autofocus>
    </div>

    <div class="mb-6">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="input-field" id="password" required>
    </div>

    <button type="submit" id="loginBtn" class="btn-primary">
      <span id="btnText">Login</span>
      <span id="btnSpinner" class="spinner hidden"></span>
    </button>
  </form>
</div>

<script>
  // Theme Toggle
  const themeToggle = document.getElementById('themeToggle');
  const body = document.body;
  const savedTheme = localStorage.getItem('theme') || 'dark';

  function applyTheme(theme) {
    if (theme === 'light') {
      body.classList.remove('dark-mode');
      body.classList.add('light-mode');
    } else {
      body.classList.remove('light-mode');
      body.classList.add('dark-mode');
    }
    localStorage.setItem('theme', theme);
  }

  applyTheme(savedTheme);

  themeToggle.addEventListener('click', () => {
    const currentTheme = body.classList.contains('light-mode') ? 'light' : 'dark';
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    applyTheme(newTheme);
  });

  // Login Form
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorAlert = document.getElementById('errorAlert');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    // UI Loading State
    errorAlert.style.display = 'none';
    loginBtn.disabled = true;
    btnText.textContent = 'Authenticating...';
    btnSpinner.classList.remove('hidden');

    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        const data = await response.json();
        // Store JWT in cookie for server-side authentication
        document.cookie = `jwt_token=${data.token}; path=/; max-age=86400`;
        // Redirect to homepage
        window.location.href = '/';
      } else {
        errorAlert.textContent = 'Invalid username or password.';
        errorAlert.style.display = 'block';
      }
    } catch (error) {
      console.error('Error:', error);
      errorAlert.textContent = 'Connection error. Please try again.';
      errorAlert.style.display = 'block';
    } finally {
      loginBtn.disabled = false;
      btnText.textContent = 'Login';
      btnSpinner.classList.add('hidden');
    }
  });
</script>

</body>
</html>
